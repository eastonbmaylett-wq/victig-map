<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victig Court Search TAT Map</title>
<script src="/d3.min.js"></script>
<script src="/topojson-client.min.js"></script>
<link rel="stylesheet" href="/static/map.css">
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:14px">
    <img id="header-logo" src="/victig-logo-white.png" alt="Victig Background Checks">
    <div><div class="subtitle" id="data-date">Loading…</div></div>
  </div>
  <span id="delayed-badge">— delayed</span>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search county or state…" autocomplete="off">
    <div id="search-results"></div>
  </div>
</div>



<div id="update-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#1a2b45;color:white;padding:8px 16px;font-size:13px;z-index:9999;align-items:center;justify-content:center;gap:12px">
  🔄 A new version of the map is available.
  <button onclick="location.reload(true)" style="padding:4px 14px;background:white;color:#1a2b45;border:none;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px">Update Now</button>
  <button onclick="this.parentElement.style.display='none'" style="padding:4px 10px;background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.3);border-radius:5px;cursor:pointer;font-size:12px">Dismiss</button>
</div>
<div id="map-wrap">
  <svg id="map-svg"></svg>
  <div id="zoom-controls">
    <button id="z-in">+</button>
    <button id="z-reset">⌂</button>
    <button id="z-out">−</button>
  </div>
  <div id="tooltip"></div>
  <div id="popup"><span id="popup-close" onclick="closePopup()">×</span><div id="popup-body"></div></div>

  <div id="panels">
    <div class="side-panel">
      <div class="panel-header" onclick="togglePanel('fastest')">
        <h4>🥇 Fastest Counties</h4><span class="panel-toggle" id="tog-fastest">▲</span>
      </div>
      <div class="panel-body" id="panel-fastest"></div>
    </div>
    <div class="side-panel">
      <div class="panel-header" onclick="togglePanel('slowest')">
        <h4>🐢 Slowest Counties</h4><span class="panel-toggle" id="tog-slowest">▲</span>
      </div>
      <div class="panel-body" id="panel-slowest"></div>
    </div>
  </div>

  <div id="legend">
    <div id="legend-gradient">
      <h4>Avg TAT (days)</h4>
      <div id="gradient-bar"></div>
      <div id="gradient-labels"><span>Fastest</span><span>Slowest</span></div>
    </div>

  </div>
</div>

<div id="pw-gate">
  <h3>🔒 Admin Access</h3>
  <p>Enter the admin password to edit county statuses.</p>
  <input id="pw-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')submitPw()">
  <div id="pw-error"></div>
  <div class="btn-row">
    <button id="pw-cancel-btn" onclick="cancelPw()">Cancel</button>
    <button id="pw-submit" onclick="submitPw()">Unlock</button>
  </div>
</div>
<div id="overlay" onclick="closeAdmin()"></div>
<div id="admin-panel">
  <h3>Edit County Status</h3>
  <div id="admin-lbl"></div>
  <select id="admin-status">
    <option value="ok">✅ No Delay</option>
    <option value="delay">🟡 Delay</option>
    <option value="high_tat">🟠 Avg TAT &gt;14 Days</option>
    <option value="significant">🔴 Significant Delay</option>
  </select>
  <textarea id="admin-desc" placeholder="Delay description (optional)…"></textarea>
  <div class="btn-row">
    <button id="admin-save" onclick="saveAdmin()">Save</button>
    <button id="admin-cancel" onclick="closeAdmin()">Cancel</button>
  </div>
</div>

<script src="/static/map.js"></script>
</body>
</html>
