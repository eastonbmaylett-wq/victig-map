# fly.toml app configuration file generated for victig-map on 2026-05-06T10:29:26-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'victig-map'
primary_region = 'dfw'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'victig_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
