<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victig Court Search — TAT Map</title>
<script src="/d3.min.js"></script>
<script src="/topojson-client.min.js"></script>
<link rel="stylesheet" href="/static/embed.css">
</head>
<body>
<div id="wrap">
  <svg id="map-svg"></svg>
  <div id="legend">
    <div class="leg-row"><div class="leg-sw" style="background:#55ae5c"></div>No Delay</div>
    <div class="leg-row"><div class="leg-sw" style="background:#dea922"></div>Delay</div>
    <div class="leg-row"><div class="leg-sw" style="background:#de7612"></div>Avg TAT &gt;14d</div>
    <div class="leg-row"><div class="leg-sw" style="background:#cf4027"></div>Significant Delay</div>
    <div class="leg-row"><div class="leg-sw" style="background:#55ae5c"></div>No Data</div>
  </div>
  <div id="zoom-btns">
    <button id="z-in" title="Zoom in">+</button>
    <button id="z-reset" title="Reset">⌂</button>
    <button id="z-out" title="Zoom out">−</button>
  </div>
  <div id="data-info"></div>
  <div id="tooltip"></div>
  <div id="popup">
    <span id="popup-close" onclick="closePopup()">✕</span>
    <h3 id="popup-name"></h3>
    <div id="popup-body"></div>
  </div>
  <div id="brand">victig.com</div>
</div>
<script src="/static/embed.js"></script>
</body>
</html>
